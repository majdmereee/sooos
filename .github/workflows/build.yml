name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد جافا
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. الحل الجذري: إنشاء المجلدات أولاً ثم حقن ملف AndroidManifest
      - name: Radical Fix - Create Folders and Inject Correct AndroidManifest
        run: |
          mkdir -p android/app/src/main
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.example.sos">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.DISABLE_KEYGUARD" />
              <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />

              <application
                  android:label="Instant SOS"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:showWhenLocked="true"
                  android:turnScreenOn="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <!-- شاشة الإنذار -->
                  <activity 
                      android:name=".EmergencyAlertActivity"
                      android:showWhenLocked="true"
                      android:turnScreenOn="true"
                      android:exported="false"
                      android:theme="@style/LaunchTheme" />

                  <!-- خدمة أزرار الصوت -->
                  <service android:name=".VolumeButtonService"
                      android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data
                          android:name="android.accessibilityservice"
                          android:resource="@xml/accessibility_service_config" />
                  </service>

                  <!-- هذا هو السطر الذي يحل المشكلة جذرياً (V2 Embedding) -->
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>

              <queries>
                  <intent>
                      <action android:name="android.intent.action.PROCESS_TEXT"/>
                      <data android:mimeType="text/plain"/>
                  </intent>
              </queries>
          </manifest>
          EOF

      # 4. إعداد بيئة Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      # 5. جلب المكاتب (الآن سيعمل بنجاح دون أخطاء)
      - name: Install dependencies
        run: flutter pub get

      # 6. بناء التطبيق
      - name: Build APK
        run: flutter build apk --release

      # 7. رفع التطبيق النهائي
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: instant-sos-app
          path: build/app/outputs/flutter-apk/app-release.apk
