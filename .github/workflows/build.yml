name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Nuke and Rebuild Android Folder (Ultimate Fix)
        run: |
          rm -rf android
          flutter create . --platforms=android
          
          # رفع إصدار الكوتلن ليتوافق مع المكاتب
          sed -i -E 's/id "org.jetbrains.kotlin.android" version "[0-9\.]+"/id "org.jetbrains.kotlin.android" version "1.9.22"/g' android/settings.gradle || true
          sed -i -E "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle || true
          
          # إجبار التطبيق على استخدام إصدار أندرويد متوافق مع شاشة المكالمات (24)
          sed -i -E 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle || true
          
          # سكربت إضافة الصلاحيات المتقدمة للمانيفست
          cat << 'EOF' > fix_manifest.dart
          import 'dart:io';
          void main() {
            var file = File('android/app/src/main/AndroidManifest.xml');
            var content = file.readAsStringSync();
            var permissions = '''
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <uses-permission android:name="android.permission.DISABLE_KEYGUARD" />
            <uses-permission android:name="android.permission.VIBRATE" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            ''';
            content = content.replaceFirst('<application', permissions + '<application');
            file.writeAsStringSync(content);
          }
          EOF
          dart fix_manifest.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: instant-sos-app
          path: build/app/outputs/flutter-apk/app-release.apk
