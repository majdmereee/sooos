name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Ultimate Destruction of the Error
        run: |
          rm -rf android
          flutter create . --platforms=android
          
          cat << 'EOF' > perfect_fix.dart
          import 'dart:io';

          void main() {
            print('--- Starting Perfect Fix Script ---');

            // 1. ترقية أداة بناء أندرويد (AGP) إلى 8.4.2 وإصدار الكوتلن إلى 1.9.22
            var settingsFile = File('android/settings.gradle');
            if (settingsFile.existsSync()) {
              var content = settingsFile.readAsStringSync();
              content = content.replaceAll(RegExp(r'id "com.android.application" version "[^"]+"'), 'id "com.android.application" version "8.4.2"');
              content = content.replaceAll(RegExp(r'id "org.jetbrains.kotlin.android" version "[^"]+"'), 'id "org.jetbrains.kotlin.android" version "1.9.22"');
              settingsFile.writeAsStringSync(content);
            }

            // 2. تحديث ملف البناء الاحتياطي للكوتلن
            var buildFile = File('android/build.gradle');
            if (buildFile.existsSync()) {
              var content = buildFile.readAsStringSync();
              content = content.replaceAll(RegExp(r"ext.kotlin_version = '[^']+'"), "ext.kotlin_version = '1.9.22'");
              buildFile.writeAsStringSync(content);
            }

            // 3. ترقية محرك الـ Gradle إلى 8.6 لقراءة ملفات أندرويد 35 بنجاح
            var gradleWrapperFile = File('android/gradle/wrapper/gradle-wrapper.properties');
            if (gradleWrapperFile.existsSync()) {
              var content = gradleWrapperFile.readAsStringSync();
              content = content.replaceAll(RegExp(r'gradle-.*-all.zip'), 'gradle-8.6-all.zip');
              gradleWrapperFile.writeAsStringSync(content);
            }

            // 4. ضبط إعدادات الـ SDK (الحد الأدنى 24 والتشغيل 35) ليتوافق مع شاشة المكالمات
            var appBuildFile = File('android/app/build.gradle');
            if (appBuildFile.existsSync()) {
              var content = appBuildFile.readAsStringSync();
              content = content.replaceAll('compileSdkVersion flutter.compileSdkVersion', 'compileSdkVersion 35');
              content = content.replaceAll('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 24');
              content = content.replaceAll('targetSdkVersion flutter.targetSdkVersion', 'targetSdkVersion 35');
              content = content.replaceAll(RegExp(r'compileSdk \d+'), 'compileSdk 35');
              content = content.replaceAll(RegExp(r'minSdk \d+'), 'minSdk 24');
              content = content.replaceAll(RegExp(r'targetSdk \d+'), 'targetSdk 35');
              appBuildFile.writeAsStringSync(content);
            }

            // 5. تجاوز فحص إصدارات أندرويد 15 غير المستقرة
            var gradlePropsFile = File('android/gradle.properties');
            if (gradlePropsFile.existsSync()) {
              gradlePropsFile.writeAsStringSync('\nandroid.suppressUnsupportedCompileSdk=35\n', mode: FileMode.append);
            }

            // 6. حقن جميع صلاحيات شاشة المكالمات وتخطي القفل والوضع الصامت
            var manifestFile = File('android/app/src/main/AndroidManifest.xml');
            if (manifestFile.existsSync()) {
              var content = manifestFile.readAsStringSync();
              var permissions = '''
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.DISABLE_KEYGUARD" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              ''';
              content = content.replaceFirst('<application', permissions + '<application');
              manifestFile.writeAsStringSync(content);
            }

            print('--- Perfect Fix Script Completed Successfully ---');
          }
          EOF
          dart perfect_fix.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: instant-sos-app
          path: build/app/outputs/flutter-apk/app-release.apk
