name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Nuke and Rebuild Android Folder (The Ultimate Tooling Upgrade)
        run: |
          rm -rf android
          flutter create . --platforms=android
          
          # 1. ترقية أداة بناء أندرويد (AGP) إلى 8.1.0 لقراءة ملفات أندرويد 35 بنجاح
          sed -i -E 's/id "com.android.application" version "[0-9\.]+"/id "com.android.application" version "8.1.0"/g' android/settings.gradle || true
          
          # 2. ترقية محرك الـ Gradle إلى 8.3 ليتوافق مع أداة البناء الجديدة ويحدث الـ AAPT2
          sed -i 's/gradle-.*-all.zip/gradle-8.3-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties || true
          
          # 3. تثبيت إصدار الكوتلن المتوافق 1.9.22
          sed -i -E 's/id "org.jetbrains.kotlin.android" version "[0-9\.]+"/id "org.jetbrains.kotlin.android" version "1.9.22"/g' android/settings.gradle || true
          sed -i -E "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle || true
          
          # 4. ضبط إعدادات الـ SDK لتتوافق مع مكتبة المكالمات
          sed -i -E 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle || true
          sed -i -E 's/minSdkVersion [0-9]+/minSdkVersion 24/g' android/app/build.gradle || true
          sed -i -E 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 35/g' android/app/build.gradle || true
          sed -i -E 's/compileSdkVersion [0-9]+/compileSdkVersion 35/g' android/app/build.gradle || true
          sed -i -E 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 35/g' android/app/build.gradle || true
          sed -i -E 's/targetSdkVersion [0-9]+/targetSdkVersion 35/g' android/app/build.gradle || true
          
          # سكربت حقن الصلاحيات المتقدمة لفتح القفل وتجاوز الوضع الصامت
          cat << 'EOF' > fix_manifest.dart
          import 'dart:io';
          void main() {
            var file = File('android/app/src/main/AndroidManifest.xml');
            var content = file.readAsStringSync();
            var permissions = '''
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <uses-permission android:name="android.permission.DISABLE_KEYGUARD" />
            <uses-permission android:name="android.permission.VIBRATE" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            ''';
            content = content.replaceFirst('<application', permissions + '<application');
            file.writeAsStringSync(content);
          }
          EOF
          dart fix_manifest.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: instant-sos-app
          path: build/app/outputs/flutter-apk/app-release.apk
