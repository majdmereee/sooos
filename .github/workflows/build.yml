name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Nuke and Rebuild Android Folder (The Ultimate Fix + Kotlin Update)
        run: |
          rm -rf android
          flutter create . --platforms=android
          
          # ترقية إصدار الكوتلن ليتوافق مع المكاتب الحديثة
          sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          
          # سكربت إضافة الصلاحيات للمانيفست
          cat << 'EOF' > fix_manifest.dart
          import 'dart:io';
          void main() {
            var file = File('android/app/src/main/AndroidManifest.xml');
            var content = file.readAsStringSync();
            var permissions = '''
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            ''';
            content = content.replaceFirst('<application', permissions + '<application');
            file.writeAsStringSync(content);
          }
          EOF
          dart fix_manifest.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: instant-sos-app
          path: build/app/outputs/flutter-apk/app-release.apk
